<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Trang Bị - PoC Wiki</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 'lor-gold': '#c89b3c' } } } }
    </script>
    <style>
        body { background: #04060b; color: #f8fafc; font-family: 'Open Sans', sans-serif; }
        .bg-fixed-section { background: linear-gradient(to bottom, #04060b, rgba(4,6,11,0.8)), url('https://images.contentstack.io/v3/assets/blt0eb2a29869260172/LoR_WorldMap_Background.jpg') fixed center/cover; }
        .item-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; backdrop-filter: blur(12px); transition: 0.3s; }
        .item-card:hover { transform: translateY(-5px); border-color: rgba(200,155,60,0.4); background: rgba(255,255,255,0.05); }
        
        .border-Epic { border-top: 3px solid #a855f7; }
        .border-Rare { border-top: 3px solid #3b82f6; }
        .border-Common { border-top: 3px solid #94a3b8; }

        .active-all { background: #c89b3c !important; color: black; }
        .active-Epic { background: #a855f7 !important; box-shadow: 0 0 15px #a855f766; color: white !important; }
        .active-Rare { background: #3b82f6 !important; box-shadow: 0 0 15px #3b82f666; color: white !important; }
        .active-Common { background: #94a3b8 !important; box-shadow: 0 0 15px #94a3b866; color: white !important; }

        .item-icon-wrapper { -webkit-mask-image: radial-gradient(circle, black 40%, transparent 72%); }
        /* Style cho Tooltip */
.tooltip-container {
    position: relative;
    display: inline-block;
    cursor: help;
}

.tooltip-text {
    visibility: hidden;
    width: 200px;
    background-color: #1a2235;
    color: #f8fafc;
    text-align: left;
    border: 1px solid #c89b3c;
    border-radius: 8px;
    padding: 10px;
    position: absolute;
    z-index: 100;
    bottom: 125%; /* Hiển thị phía trên chữ */
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    transition: opacity 0.3s;
    font-size: 12px;
    line-height: 1.4;
    box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    pointer-events: none;
}

.tooltip-container:hover .tooltip-text {
    visibility: visible;
    opacity: 1;
}
    </style>
</head>
<body>
    <nav class="fixed top-0 w-full z-50 flex justify-between px-10 py-4 bg-[#04060b]/80 backdrop-blur-md border-b border-white/5">
        <div class="flex items-center gap-3 font-bold text-xl tracking-tighter uppercase">
            <div class="w-8 h-8 bg-lor-gold rounded text-black flex items-center justify-center">P</div>
            <span>PoC <span class="text-lor-gold">Wiki</span></span>
        </div>
    </nav>

    <div class="bg-fixed-section min-h-screen pt-32 pb-20 px-6">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-end mb-12 gap-6">
                <div>
                    <h1 class="text-5xl font-bold uppercase italic mb-2">Hệ Thống <span class="text-lor-gold">Trang Bị</span></h1>
                    <p class="text-slate-400 border-l-2 border-lor-gold pl-4">Cơ sở dữ liệu toàn diện về các chỉ số và hiệu ứng của Trang Bị.</p>
                </div>
                
                <div class="flex flex-wrap gap-4 items-center">
                    <input type="text" id="searchInput" placeholder="Tìm trang bị..." class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 outline-none focus:border-lor-gold transition-all w-64">
                    <div class="flex bg-black/40 p-1 rounded-xl border border-white/5 text-[10px] font-bold uppercase tracking-widest">
                        <button onclick="setFilter('all', this)" class="filter-btn active-all px-4 py-2 rounded-lg">Tất cả</button>
                        <button onclick="setFilter('Epic', this)" class="filter-btn px-4 py-2 rounded-lg text-purple-400">Sử Thi</button>
                        <button onclick="setFilter('Rare', this)" class="filter-btn px-4 py-2 rounded-lg text-cyan-400">Hiếm</button>
                        <button onclick="setFilter('Common', this)" class="filter-btn px-4 py-2 rounded-lg text-slate-400">Thường</button>
                    </div>
                </div>
            </div>
            <div id="item-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>
    </div>

    <script>
        let allItems = [];
        let currentRarity = 'all';

        async function init() {
            try {
                const res = await fetch('items.json');
                allItems = await res.json();
                render();
            } catch (e) { console.error("Lỗi tải dữ liệu"); }
        }

        function cleanText(text) {
    if (!text) return "";

    // Từ điển giải thích hiệu ứng
    const descriptions = {
        'Bắt Giữ': 'Loại bỏ một đơn vị khỏi trận đấu. Đơn vị đó sẽ quay trở lại khi đơn vị Bắt Giữ rời khỏi sân đấu.',
        'Mạnh nhất': 'Đơn vị có chỉ số Tấn công cao nhất, sau đó là Máu, sau đó là Chi phí.',
        'Thách Đấu': 'Có thể chọn đơn vị chặn đòn cho mình khi tấn công.',
        'Phù Du': 'Đơn vị này sẽ biến mất khi kết thúc vòng đấu hoặc sau khi tấn công.'
    };

    return text
        // Xử lý Keywords & Vocab và bọc chúng trong Tooltip
        .replace(/<(style=Keyword|style=Vocab)>(.*?)<\/style>/g, (match, p1, content) => {
            const desc = descriptions[content] || "Hiệu ứng đặc biệt trong game.";
            const colorClass = p1.includes('Keyword') ? 'text-cyan-400' : 'text-lor-gold italic';
            
            return `
                <span class="tooltip-container ${colorClass} font-bold">
                    ${content}
                    <span class="tooltip-text font-normal text-white">
                        <strong class="text-lor-gold block mb-1">${content}</strong>
                        ${desc}
                    </span>
                </span>`;
        })
        // Loại bỏ thẻ link và sprite cũ để code sạch hơn
        .replace(/<link=.*?>(.*?)<\/link>/g, '$1')
        .replace(/<sprite name=.*?>/g, '')
        .replace(/<br>/g, '<br class="mb-2">');
}

        function render() {
            const grid = document.getElementById('item-grid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allItems.filter(i => (currentRarity === 'all' || i.rarityRef === currentRarity) && i.name.toLowerCase().includes(search));

            grid.innerHTML = filtered.map(item => `
                <div class="item-card p-6 border-${item.rarityRef}">
                    <div class="item-icon-wrapper h-40 flex items-center justify-center mb-4">
                        <img src="${item.assetAbsolutePath}" class="w-full h-full object-contain scale-125">
                    </div>
                    <div class="text-center">
                        <span class="text-[9px] uppercase tracking-widest text-slate-500 font-black">${item.rarity}</span>
                        <h3 class="text-lg font-bold text-white my-2 min-h-[50px] flex items-center justify-center leading-tight">${item.name}</h3>
                        <div class="text-[13px] text-slate-400 leading-relaxed min-h-[80px]">${cleanText(item.description)}</div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function setFilter(rarity, btn) {
            currentRarity = rarity;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.className = b.className.replace(/active-\S+/g, '').trim();
                b.classList.remove('active-all');
            });
            btn.classList.add(`active-${rarity}`);
            render();
        }

        document.getElementById('searchInput').addEventListener('input', render);
        init();
    </script>
</body>
</html>
