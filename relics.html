<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Cổ Vật - PoC Guide</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'lor-gold': '#c89b3c' }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #04060b; color: #f8fafc; font-family: 'Open Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        
        .bg-fixed-section {
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            background-image: linear-gradient(to bottom, #04060b 0%, rgba(4, 6, 11, 0.85) 50%, #04060b 100%), 
                              url('https://images.contentstack.io/v3/assets/blt0eb2a29869260172/LoR_WorldMap_Background.jpg');
        }

        /* --- STYLE ICON GRID --- */
        .relic-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .relic-item:hover { transform: translateY(-5px); }

        .relic-icon-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 1rem;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(10, 18, 35, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        /* Glow hiệu ứng theo độ hiếm */
        .border-Epic .relic-icon-container { border-color: #a855f7; box-shadow: 0 0 15px rgba(168, 85, 247, 0.3); }
        .border-Rare .relic-icon-container { border-color: #06b6d4; box-shadow: 0 0 15px rgba(6, 182, 212, 0.3); }
        .border-Common .relic-icon-container { border-color: #94a3b8; box-shadow: 0 0 10px rgba(148, 163, 184, 0.2); }

        .relic-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: white;
            margin-bottom: 2px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
        }

        .relic-rarity-text {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        .relic-description {
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.6;
            max-width: 220px;
        }

        .text-Epic { color: #c084fc; }
        .text-Rare { color: #22d3ee; }
        .text-Common { color: #94a3b8; }

        /* Filter & Tooltip */
        .filter-btn { transition: all 0.2s; border: 1px solid transparent; }
        .filter-btn.active { background-color: #c89b3c !important; color: black !important; border-color: #c89b3c !important; box-shadow: 0 0 15px rgba(200, 155, 60, 0.3); }
        
        .tooltip-container { position: relative; display: inline; cursor: help; }
        .tooltip-text {
            visibility: hidden; width: 200px; background: #1a2235; color: #f8fafc;
            border: 1px solid #c89b3c; border-radius: 8px; padding: 10px;
            position: absolute; z-index: 100; bottom: 125%; left: 50%;
            transform: translateX(-50%); opacity: 0; transition: 0.3s;
            font-size: 11px; pointer-events: none; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            text-align: left;
        }
        .tooltip-container:hover .tooltip-text { visibility: visible; opacity: 1; }

        .page-btn { transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; }
        .page-btn:hover:not(:disabled) { border-color: #c89b3c; color: #c89b3c; }
        .page-btn.active { background: #c89b3c; color: black; border-color: #c89b3c; }
    </style>
</head>
<body>

    <script src="components.js"></script>

    <div class="bg-fixed-section min-h-screen pt-32 pb-24">
        <div class="max-w-[1400px] mx-auto px-6">
            
            <div class="flex flex-col lg:flex-row justify-between items-end mb-16 gap-8">
                <div>
                    <h1 class="text-4xl md:text-5xl font-bold uppercase mb-4 tracking-tight text-white">Kho <span class="text-lor-gold">Cổ Vật</span></h1>
                    <p class="text-slate-400 text-lg italic tracking-wide">Cơ sở dữ liệu toàn diện về các chỉ số, hiệu ứng và từ điển kỹ năng</p>
                </div>
                
                <div class="flex flex-wrap items-center gap-4 w-full lg:w-auto">
                    <div class="relative flex-grow sm:flex-grow-0">
                        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                        <input type="text" id="searchInput" placeholder="Tìm tên cổ vật..." 
                               class="bg-white/5 border border-white/10 rounded-xl pl-12 pr-5 py-3 text-base focus:border-lor-gold outline-none w-full sm:w-64 transition-all text-white placeholder:text-slate-600">
                    </div>

                    <div class="flex bg-white/5 p-1 rounded-xl border border-white/10">
                        <button onclick="setFilter('all', this)" class="filter-btn active px-4 py-2 rounded-lg text-xs font-bold uppercase">Tất cả</button>
                        <button onclick="setFilter('Epic', this)" class="filter-btn px-4 py-2 rounded-lg text-xs font-bold uppercase text-purple-400">Sử Thi</button>
                        <button onclick="setFilter('Rare', this)" class="filter-btn px-4 py-2 rounded-lg text-xs font-bold uppercase text-cyan-400">Hiếm</button>
                        <button onclick="setFilter('Common', this)" class="filter-btn px-4 py-2 rounded-lg text-xs font-bold uppercase text-slate-400">Thường</button>
                    </div>
                </div>
            </div>

            <div id="relic-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-x-10 gap-y-16 mb-16 px-4"></div>

            <div id="pagination" class="flex justify-center items-center gap-2"></div>
        </div>
    </div>

    <script>
        let allRelics = [];
        let filteredRelics = [];
        let dictionary = { vocabTerms: [], keywords: [] };
        let currentRarity = 'all';
        let currentPage = 1;
        const itemsPerPage = 20;

        async function init() {
            try {
                const [relicsRes, dictRes] = await Promise.all([
                    fetch('relics.json'),
                    fetch('dictionary.json')
                ]);
                allRelics = await relicsRes.json();
                dictionary = await dictRes.json();
                updateFilteredRelics();
            } catch (e) {
                console.error("Lỗi:", e);
                document.getElementById('relic-grid').innerHTML = '<p class="col-span-full text-center py-20 text-red-400">Không thể kết nối với dữ liệu (relics.json/dictionary.json)</p>';
            }
        }

        function getDefinition(term) {
            const lowerTerm = term.toLowerCase().trim();
            const findIn = (list) => list.find(i => i.name.toLowerCase() === lowerTerm);
            const result = findIn(dictionary.vocabTerms) || findIn(dictionary.keywords);
            return result ? result.description : "Thông tin đang cập nhật...";
        }

        function cleanText(text) {
            if (!text) return "";
            return text
                .replace(/<(style=Keyword|style=Vocab)>(.*?)<\/style>/g, (match, type, content) => {
                    const desc = getDefinition(content);
                    const colorClass = type.includes('Vocab') ? 'text-lor-gold' : 'text-cyan-400';
                    return `<span class="tooltip-container ${colorClass} font-bold underline decoration-dotted underline-offset-4 cursor-help">${content}<span class="tooltip-text font-normal text-slate-300"><b class="text-lor-gold block mb-1 border-b border-lor-gold/20 pb-1">${content}</b>${desc}</span></span>`;
                })
                .replace(/<link=.*?>(.*?)<\/link>/g, '<span class="text-white font-semibold">$1</span>')
                .replace(/<sprite.*?>/g, '')
                .replace(/<br>/g, ' ')
                .trim();
        }

        function updateFilteredRelics() {
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            filteredRelics = allRelics.filter(item => {
                const matchesRarity = currentRarity === 'all' || item.rarityRef === currentRarity;
                const matchesSearch = item.name.toLowerCase().includes(searchVal);
                return matchesRarity && matchesSearch;
            });
            currentPage = 1;
            render();
        }

        function render() {
            const grid = document.getElementById('relic-grid');
            const paginationEl = document.getElementById('pagination');
            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedRelics = filteredRelics.slice(startIndex, startIndex + itemsPerPage);

            if (paginatedRelics.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center py-20 text-slate-500 text-xl font-medium">Không tìm thấy cổ vật nào phù hợp.</p>';
                paginationEl.innerHTML = '';
                return;
            }

            grid.innerHTML = paginatedRelics.map(item => `
                <div class="relic-item border-${item.rarityRef}">
                    <div class="relic-icon-container">
                        <img src="${item.assetAbsolutePath}" class="w-20 h-20 object-contain drop-shadow-2xl" loading="lazy" alt="${item.name}">
                        <div class="absolute inset-x-0 bottom-0 h-1/3 bg-gradient-to-t from-black/40 to-transparent"></div>
                    </div>
                    <h3 class="relic-name">${item.name}</h3>
                    <div class="relic-rarity-text text-${item.rarityRef}">${item.rarity}</div>
                    <p class="relic-description">${cleanText(item.description)}</p>
                </div>
            `).join('');

            renderPagination(paginationEl);
            if(window.lucide) lucide.createIcons();
        }

        function renderPagination(container) {
            const totalPages = Math.ceil(filteredRelics.length / itemsPerPage);
            if (totalPages <= 1) { container.innerHTML = ''; return; }
            
            let btns = [];
            btns.push(`<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} class="page-btn px-4 py-2 rounded-lg bg-white/5 disabled:opacity-20"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>`);
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    btns.push(`<button onclick="changePage(${i})" class="page-btn w-10 h-10 rounded-lg font-bold ${i === currentPage ? 'active' : 'bg-white/5'}">${i}</button>`);
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    btns.push(`<span class="text-slate-600 px-2">...</span>`);
                }
            }
            
            btns.push(`<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} class="page-btn px-4 py-2 rounded-lg bg-white/5 disabled:opacity-20"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>`);
            container.innerHTML = btns.join('');
        }

        function changePage(page) {
            currentPage = page;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function setFilter(rarity, btn) {
            currentRarity = rarity;
            document.querySelectorAll('.filter-btn').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
            updateFilteredRelics();
        }

        document.getElementById('searchInput').addEventListener('input', updateFilteredRelics);
        
        // Khởi tạo
        init();
    </script>
</body>
</html>
