<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tài Nguyên & Báu Vật | Path of Champions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Be+Vietnam+Pro:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --lor-gold: #c89b3c; --lor-blue: #00d2ff; }
        body { 
            background: #010a13; color: #f0f0f0; 
            font-family: 'Be Vietnam Pro', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #051622 0%, #010a13 80%);
            padding-top: 40px;
        }
        .font-header { font-family: 'Space Grotesk', sans-serif; }
        .title-underline { height: 2px; background: linear-gradient(90deg, transparent, var(--lor-gold), transparent); width: 100%; margin-top: 0.5rem; }

        .tab-btn {
            position: relative; padding: 0.75rem 1rem; color: #888;
            text-transform: uppercase; letter-spacing: 1px; font-weight: 700;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tab-btn.active { color: var(--lor-gold); background: rgba(200, 155, 60, 0.05); }
        .tab-btn::after { content: ''; position: absolute; bottom: 0; left: 50%; width: 0; height: 2px; background: var(--lor-gold); transition: all 0.4s; transform: translateX(-50%); }
        .tab-btn.active::after { width: 100%; }

        /* Style này sẽ áp dụng cho các thẻ nội dung được load vào */
        .item-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease forwards; }
        .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 10px 15px;
    min-width: 100px;
    color: #a4a4a8; /* Màu chữ xám mặc định */
    transition: all 0.3s ease;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    background: none;
    border: none;
}
.tab-item img {
    width: 32px;
    height: 32px;
    object-fit: contain;
    /* KHÔNG dùng grayscale nữa để hiện màu luôn */
    filter: opacity(0.8); 
    transition: all 0.3s ease;
}

.tab-item span {
    font-size: 11px;
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 0.5px;
    white-space: nowrap;
    color: #a4a4a8; /* Chữ mặc định vẫn hơi xám để làm nổi bật cái đang chọn */
}

/* Khi Hover: Chỉ làm sáng lên một chút và nhấc nhẹ icon */
.tab-item:hover img {
    filter: opacity(1) brightness(1.2);
    transform: translateY(-2px);
}

.tab-item:hover span {
    color: #ffffff;
}

/* Trạng thái ACTIVE (Được chọn): Giữ nguyên để có gạch vàng rực rỡ */
.tab-item.active img {
    filter: opacity(1) drop-shadow(0 0 8px rgba(240, 208, 160, 0.6));
    transform: scale(1.1);
}

.tab-item.active span {
    color: #f0d0a0; /* Chữ chuyển sang vàng kim loại */
}
@media (max-width: 768px) {
    .tab-text {
        display: none; /* Chỉ hiện icon trên điện thoại */
    }
    .tab-item {
        padding: 10px 0;
    }
}
    </style>
</head>
<body class="pb-20">
    <script src="components.js"></script>
    <header class="relative pt-20 pb-16 px-6 overflow-hidden text-center">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-10"></div>
        <div class="relative z-10 max-w-4xl mx-auto">
            <h4 class="text-lor-blue tracking-[0.5em] uppercase text-sm font-bold mb-4 opacity-80">The Path of Champions</h4>
            <h1 class="font-header text-5xl md:text-7xl font-bold text-white uppercase italic tracking-tighter">
                Hệ Thống <span class="text-lor-gold">Vật Phẩm</span>
            </h1>
            <div class="title-underline"></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6">
        <div class="grid grid-cols-7 lg:grid-cols-13 gap-1 mb-8 border-b border-white/10 w-full pb-2">
            <button class="tab-item active" onclick="switchTab(event, 'stardust.html')">
                <img src="https://wiki.leagueoflegends.com/en-us/images/thumb/PoC_Stardust.png/200px-PoC_Stardust.png?3c1ec" alt="Stardust">
                <span>Bụi Tinh Tú</span>
            </button>
        
            <button class="tab-item" onclick="switchTab(event, 'fragments.html')">
                <img src="https://wiki.leagueoflegends.com/en-us/images/Champion_Fragment_LoR_icon.png?9ab1f" alt="Fragment">
                <span>Mảnh Ghép</span>
            </button>
        
            <button class="tab-item" onclick="switchTab(event, 'wildfragments.html')">
                <img src="https://wiki.leagueoflegends.com/en-us/images/thumb/Wild_Fragment_LoR_icon.png/200px-Wild_Fragment_LoR_icon.png?6d246" alt="Wild Fragment">
                <span>Mảnh Ghép Bí Ẩn</span>
            </button>
        
            <button class="tab-item" onclick="switchTab(event, 'glory.html')">
                <img src="https://wiki.leagueoflegends.com/en-us/images/PoC_Glory_icon.png?b111d" alt="Glory Coin">
                <span>Xu Vinh Danh</span>
            </button>
        
            <button class="tab-item" onclick="switchTab(event, 'starcrystal.html')">
                <img src="https://wiki.leagueoflegends.com/en-us/images/thumb/Star_Crystal_LoR_Icon.png/200px-Star_Crystal_LoR_Icon.png?74e26" alt="Star Crystal">
                <span>Pha Lê Tinh Tú</span>
            </button>
        
            <button class="tab-item" onclick="switchTab(event, 'novacrystal.html')">
                <img src="https://wiki.leagueoflegends.com/en-us/images/thumb/Nova_Crystal_LoR_Icon.png/200px-Nova_Crystal_LoR_Icon.png?8a9e8" alt="Nova">
                <span>Pha Lê Sao Băng</span>
            </button>
        
            <button class="tab-item" onclick="switchTab(event, 'gemstone.html')">
                <img src="https://wiki.leagueoflegends.com/en-us/images/thumb/Gemstone_LoR_Icon.png/200px-Gemstone_LoR_Icon.png?68919" alt="Gemstone">
                <span>Đá Quý</span>
            </button>
        
            <button class="tab-item" onclick="switchTab(event, 'reliquary.html')">
                <img src="https://wiki.leagueoflegends.com/en-us/images/thumb/PoC_Gold_Reliquary.png/80px-PoC_Gold_Reliquary.png?3ab7e" alt="Reliquary">
                <span>Hòm Thần Tích</span>
            </button>
        
            <button class="tab-item" onclick="switchTab(event, 'khobau.html')">
                <img src="https://wiki.leagueoflegends.com/en-us/images/thumb/PoC_Diamond_Vault.png/40px-PoC_Diamond_Vault.png" alt="Vault">
                <span>Kho Báu</span>
            </button>
        
            <button class="tab-item" onclick="switchTab(event, 'thungngoc.html')">
                <img src="https://wiki.leagueoflegends.com/en-us/images/thumb/PoC_Nova_Crystal_Vessel.png/120px-PoC_Nova_Crystal_Vessel.png?7c3f3" alt="Cosmic Vault">
                <span>Thùng Tinh Tú</span>
            </button>
        
            <button class="tab-item" onclick="switchTab(event, 'thungdaquy.html')">
                <img src="https://wiki.leagueoflegends.com/en-us/images/thumb/PoC_Major_Gemstone_Vessel.png/80px-PoC_Major_Gemstone_Vessel.png?73ffd" alt="Gemstone Vessel">
                <span>Thùng Đá Quý</span>
            </button>
        
            <button class="tab-item" onclick="switchTab(event, 'thungngochoalinh.html')">
                <img src="https://wiki.leagueoflegends.com/en-us/images/thumb/PoC_Spirit_Blossom_Runic_Vessel.png/120px-PoC_Spirit_Blossom_Runic_Vessel.png?7251c" alt="SB Vault">
                <span>Thùng Ngọc Hoa Linh</span>
            </button>
        
            <button class="tab-item" onclick="switchTab(event, 'ruonghoalinh.html')">
                <img src="https://wiki.leagueoflegends.com/en-us/images/thumb/PoC_Spirit_Blossom_Chest.png/120px-PoC_Spirit_Blossom_Chest.png?95719" alt="SB Chest">
                <span>Rương Hoa Linh</span>
            </button>
        </div>
<div id="data-container" class="min-h-[400px]">
            </div>
        
    </main>

    <script>
        function switchTab(event, url) {
    // 1. Ngăn chặn hành động mặc định
    if (event) event.preventDefault();

    // 2. Xóa class 'active' khỏi tất cả các tab
    const tabs = document.querySelectorAll('.tab-item');
    tabs.forEach(tab => tab.classList.remove('active'));

    // 3. Xử lý logic chọn Tab
    if (event && event.currentTarget) {
        // Nếu nhấn trực tiếp vào tab
        event.currentTarget.classList.add('active');
    } else {
        // Nếu gọi mặc định lúc mở trang (tìm tab đầu tiên)
        const firstTab = document.querySelector('.tab-item');
        if (firstTab) firstTab.classList.add('active');
    }

    // 4. Load nội dung vào container
    loadHTML(url);
}

// SỬA LẠI ĐOẠN NÀY: Khi mở trang, gọi switchTab cho stardust.html
window.onload = () => {
    // Tìm phần tử tab đầu tiên (Bụi Tinh Tú) và giả lập cú click hoặc gọi hàm
    const defaultTab = document.querySelector('.tab-item');
    if (defaultTab) {
        // Gọi hàm và truyền đối tượng giả lập event để lấy currentTarget
        switchTab({ currentTarget: defaultTab, preventDefault: () => {} }, 'stardust.html');
    }
};

// Giữ nguyên hàm loadHTML của bạn để nó thực hiện fetch dữ liệu
async function loadHTML(fileName) {
    const container = document.getElementById('data-container');
    // Hiệu ứng load nhẹ để người dùng biết đang tải
    container.style.opacity = '0.5'; 
    
    try {
        const response = await fetch(fileName);
        if (!response.ok) throw new Error("Không tìm thấy file " + fileName);
        
        const html = await response.text();
        container.innerHTML = html;
        container.style.opacity = '1'; // Hiện lại nội dung
    } catch (err) {
        container.innerHTML = `
            <div class="text-center py-20 text-red-400">
                <p>Không thể tải nội dung: <b>${fileName}</b></p>
                <p class="text-xs text-slate-500 mt-2">Lưu ý: Bạn cần chạy bằng Live Server (VS Code) để xem được nội dung.</p>
            </div>`;
        container.style.opacity = '1';
    }
}
    </script>
</body>
</html>
