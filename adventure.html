<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .map-node { position: absolute; transform: translate(-50%, -50%); transition: all 0.3s; z-index: 20; }
        .map-node:hover { transform: translate(-50%, -50%) scale(1.2); filter: drop-shadow(0 0 15px #22d3ee); }
        .node-active { border-color: #c89b3c !important; box-shadow: 0 0 20px #c89b3c; }
        #arrow-svg { z-index: 10; }

        /* Style cho Tooltip (Bảng hiện khi hover) */
        .node-tooltip {
            position: absolute;
            bottom: 120%; /* Hiển thị phía trên Node */
            left: 50%;
            transform: translateX(-50%);
            background: rgba(2, 4, 8, 0.95);
            border: 1px border border-white/10;
            border-radius: 12px;
            padding: 12px;
            width: 220px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease-out;
            z-index: 100;
            pointer-events: none; /* Không ngăn cản hover vào node */
        }
        .map-node:hover .node-tooltip {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(-5px);
        }
    </style>
</head>
<body class="bg-[#020408] text-white font-sans p-8">
    <div id="adventure-header" class="max-w-7xl mx-auto mb-10 mt-2 bg-slate-900/50 border border-white/10 rounded-3xl p-6 flex flex-col gap-8 shadow-2xl relative overflow-hidden group">
    
        <div id="adv-header-bg" class="absolute inset-0 bg-cover bg-center blur-sm opacity-20 transition-transform duration-700 group-hover:scale-110"></div>
        
        <div class="relative flex items-start gap-8 z-10 w-full">
            <div class="w-28 h-28 rounded-2xl overflow-hidden shadow-2xl flex-shrink-0 border-2 border-white/10 bg-slate-950">
                <img id="adv-header-icon" src="" class="w-full h-full object-cover">
            </div>
            
            <div class="flex-1 space-y-5 self-center">
                <h1 id="adv-header-title" class="text-4xl font-black italic uppercase tracking-tighter leading-none text-white">Đang tải...</h1>
                
                <div class="flex gap-10 pt-2 border-t border-white/5">
                    <div class="flex items-center gap-4">
                        <img id="adv-header-diff-icon" src="" class="w-10 h-10 object-contain">
                        <div>
                            <span class="text-[10px] text-slate-500 uppercase tracking-widest block mb-1">Độ khó</span>
                            <b id="adv-header-diff-text" class="text-white text-base font-black uppercase tracking-tight">--</b>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-4 bg-cyan-500/5 p-3 rounded-xl border border-cyan-500/10">
                        <i data-lucide="award" class="w-10 h-10 text-cyan-400"></i>
                        <div>
                            <span class="text-[10px] text-cyan-400 font-bold uppercase tracking-widest block mb-1">Hoàn thành nhận</span>
                            <b class="text-white text-base font-black tracking-tight"><span id="adv-header-xp">0</span> XP TƯỚNG</b>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    
        <div id="adv-powers-container" class="relative z-10 grid grid-cols-1 md:grid-cols-2 gap-4">
            </div>
    </div>
    <div class="text-center mb-10">
        <h1 id="adventure-name" class="text-5xl font-black italic uppercase text-cyan-400">Đang tải...</h1>
        <p id="region-tag" class="text-slate-500 tracking-widest uppercase text-sm mt-2"></p>
    </div>

    <div class="max-w-7xl mx-auto space-y-12">
        
        <div id="map-container" class="w-full aspect-video relative overflow-hidden bg-cover bg-center shadow-2xl rounded-3xl border border-white/10">
            <svg id="arrow-svg" class="absolute inset-0 w-full h-full pointer-events-none">
                <defs>
                    <marker id="arrowhead-gold" markerWidth="10" markerHeight="7" refX="25" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#c89b3c" />
                    </marker>
                    <marker id="arrowhead-cyan" markerWidth="10" markerHeight="7" refX="25" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" />
                    </marker>
                </defs>
            </svg>
            </div>

        <div class="bg-white/5 border border-white/10 rounded-3xl p-8 space-y-6 shadow-2xl border border-white/10 animate-in slide-in-from-bottom duration-500">
            <h2 class="text-2xl font-black italic border-b border-white/10 pb-4 flex items-center gap-3 text-cyan-400 uppercase tracking-tight">
                <i data-lucide="skull" class="text-red-500"></i> Hồ sơ kẻ địch trên bản đồ
            </h2>
            
            <div id="boss-summary-area" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </div>

    </div>

    <script>
        // Quản lý trạng thái tập trung
const state = {
    cards: {},
    powers: {},
    adventure: null,
    isEditMode: false,
    activeNode: null
};

// --- API & DATA ---
async function fetchData(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`Không thể tải: ${url}`);
    return res.json();
}

async function init() {
    try {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id') || 'M001';

        const [cardsArr, allAdventures, powersArr] = await Promise.all([
            fetchData('cards.json'),
            fetchData('adventures_data.json'),
            fetchData('powers.json')
        ]);

        // Mapping dữ liệu để truy xuất O(1)
        cardsArr.forEach(c => state.cards[c.cardCode] = c);
        powersArr.forEach(p => state.powers[p.id || p.powerCode] = p);
        state.adventure = allAdventures[id];

        renderHeader();
        renderMap();
        renderBossSummary();
    } catch (err) {
        console.error("Lỗi khởi tạo:", err);
    }
}

// --- COMPONENTS RENDERERS ---

// Helper để tạo HTML cho từng Power item
const createPowerItemHTML = (pInfo, isSmall = false) => {
    const p = state.powers[pInfo.powerCode] || {};
    const sizeClass = isSmall ? 'w-10 h-10' : 'w-12 h-12';
    const textClass = isSmall ? 'text-[11px]' : 'text-xs';
    
    return `
        <div class="flex gap-3 items-start bg-black/40 p-2.5 rounded-xl border border-white/5 hover:bg-black/60 transition-colors group/item">
            <div class="${sizeClass} rounded-full border border-cyan-500/20 flex-shrink-0 overflow-hidden bg-slate-900 group-hover/item:border-cyan-500/60 transition-all">
                <img src="${p.assetAbsolutePath}" class="w-full h-full object-cover" loading="lazy">
            </div>
            <div class="flex-1">
                <b class="text-white ${isSmall ? 'text-[11px]' : 'text-xs'} block uppercase tracking-tight">${p.name || 'Sức mạnh'}</b>
                <p class="text-slate-400 ${textClass} leading-snug font-medium">${p.description || ""}</p>
            </div>
        </div>`;
};

function renderHeader() {
    const adv = state.adventure;
    if (!adv) {
        console.error("Không tìm thấy dữ liệu adventure!");
        return;
    }

    // 1. Cập nhật thông tin cơ bản
    document.getElementById('adv-header-title').innerText = adv.name;
    document.getElementById('adventure-name').innerText = adv.name; // Cập nhật cả tiêu đề dưới
    document.getElementById('region-tag').innerText = adv.region;
    
    document.getElementById('adv-header-icon').src = adv.bg_image;
    document.getElementById('adv-header-bg').style.backgroundImage = `url('${adv.bg_image}')`;
    document.getElementById('adv-header-diff-text').innerText = adv.difficulty_text;
    document.getElementById('adv-header-diff-icon').src = adv.difficulty_icon;

    // 2. Cập nhật XP (Sửa lỗi hiển thị 0)
    const xpVal = adv.completion_xp || 0;
    const xpEl = document.getElementById('adv-header-xp');
    if (xpEl) {
        xpEl.innerText = xpVal.toLocaleString('vi-VN');
    }

    // 3. Render danh sách Power trên Header
    const powersContainer = document.getElementById('adv-powers-container');
    if (powersContainer) {
        if (adv.adventure_powers && adv.adventure_powers.length > 0) {
            powersContainer.innerHTML = adv.adventure_powers.map(pInfo => {
                const p = state.powers[pInfo.powerCode] || { name: 'Sức mạnh', description: 'Đang tải...', assetAbsolutePath: '' };
                // Sử dụng style tối (Dark Mode) để khớp với giao diện tổng thể
                return `
                    <div class="bg-slate-950/60 border border-white/10 rounded-2xl p-4 flex gap-4 items-center shadow-inner hover:border-cyan-500/50 transition-all duration-300">
                        <div class="w-12 h-12 rounded-full border border-cyan-500/30 overflow-hidden bg-slate-900 flex-shrink-0">
                            <img src="${p.assetAbsolutePath}" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-1">
                            <b class="text-white text-sm font-bold uppercase tracking-wide leading-none">${p.name}</b>
                            <p class="text-slate-400 text-[11px] mt-1 leading-tight line-clamp-2">${p.description}</p>
                        </div>
                    </div>`;
            }).join('');
        } else {
            powersContainer.innerHTML = ''; // Xóa sạch nếu không có power
        }
    }

    // Khởi tạo lại các icon Lucide mới được tạo ra
    lucide.createIcons();
}

function renderMap() {
    const container = document.getElementById('map-container');
    container.style.backgroundImage = `url('${state.adventure.bg_image}')`;
    
    // Xóa nodes cũ hiệu quả hơn
    const nodes = container.querySelectorAll('.map-node');
    nodes.forEach(n => n.remove());

    const fragment = document.createDocumentFragment();

    Object.entries(state.adventure.nodes).forEach(([id, node]) => {
        const nodeEl = document.createElement('div');
        nodeEl.className = 'map-node w-12 h-12 rounded-full border-4 border-cyan-400 bg-slate-900 flex items-center justify-center shadow-lg cursor-pointer';
        nodeEl.style.cssText = `top: ${node.top}; left: ${node.left};`;
        nodeEl.dataset.id = id;

        // Tooltip Content
        const enemiesHTML = (node.enemies || []).map(enemy => {
            const card = state.cards[enemy.cardCode] || {};
            const img = (card.assets && card.assets[0]) ? card.assets[0].fullAbsolutePath : '';
            return `
                <div class="flex gap-2 items-center">
                    <img src="${img}" class="w-6 h-6 rounded border border-white/20">
                    <p class="text-white text-xs font-medium">${card.name || 'Unknown'}</p>
                </div>`;
        }).join('');

        nodeEl.innerHTML = `
            <i data-lucide="swords" class="w-6 h-6 text-cyan-400"></i>
            ${enemiesHTML ? `<div class="node-tooltip"><p class="text-[10px] text-cyan-400 font-bold uppercase mb-2">Kẻ địch</p>${enemiesHTML}</div>` : ''}
        `;
        
        fragment.appendChild(nodeEl);
    });

    container.appendChild(fragment);
    lucide.createIcons();
    requestAnimationFrame(renderAllArrows);
}

function renderBossSummary() {
    const summaryArea = document.getElementById('boss-summary-area');
    
    const html = Object.values(state.adventure.nodes)
        .filter(node => node.enemies?.length > 0)
        .flatMap(node => node.enemies.map(enemy => {
            const card = state.cards[enemy.cardCode] || {};
            const img = (card.assets && card.assets[0]) ? card.assets[0].fullAbsolutePath : '';
            
            return `
                <div class="space-y-4 animate-in fade-in duration-500">
                    <div class="w-full group relative overflow-hidden rounded-2xl border-2 border-white/10 shadow-lg">
                        <img src="${img}" class="w-full h-auto object-cover transition-transform duration-700 group-hover:scale-105" loading="lazy">
                        <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-[#020408] via-black/60 to-transparent">
                            <div class="flex items-center gap-2">
                                <i data-lucide="skull" class="w-4 h-4 text-red-500"></i>
                                <h4 class="text-xl font-black text-white uppercase italic">${card.name || 'Unknown'}</h4>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white/5 border border-white/10 rounded-2xl p-4 space-y-3">
                        <div class="grid grid-cols-1 gap-2.5">
                            ${enemy.powers.map(p => createPowerItemHTML(p)).join('')}
                        </div>
                        ${enemy.note ? `<div class="bg-lor-gold/5 p-2.5 rounded-lg border border-lor-gold/20 text-[10px] italic text-slate-300">💡 ${enemy.note}</div>` : ''}
                    </div>
                </div>`;
        })).join('');

    summaryArea.innerHTML = html;
    lucide.createIcons();
}

// --- UTILS & EVENTS ---

function renderAllArrows() {
    const svg = document.getElementById('arrow-svg');
    svg.innerHTML = svg.querySelector('defs').outerHTML; // Giữ lại defs, xóa line cũ

    Object.entries(state.adventure.nodes).forEach(([id, node]) => {
        (node.connections || []).forEach(conn => {
            const start = document.querySelector(`[data-id="${id}"]`);
            const end = document.querySelector(`[data-id="${conn.to}"]`);
            
            if (start && end) {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                const isDisc = conn.type === 'discovery';
                
                line.setAttribute('x1', start.offsetLeft);
                line.setAttribute('y1', start.offsetTop);
                line.setAttribute('x2', end.offsetLeft);
                line.setAttribute('y2', end.offsetTop);
                line.setAttribute('stroke', isDisc ? '#22d3ee' : '#c89b3c');
                line.setAttribute('stroke-width', '2');
                if (isDisc) line.setAttribute('stroke-dasharray', '8,5');
                line.setAttribute('marker-end', `url(#arrowhead-${isDisc ? 'cyan' : 'gold'})`);
                
                svg.appendChild(line);
            }
        });
    });
}

// Xử lý sự kiện kéo thả tối ưu (Throttling)
let tick = false;
function updateNodesPosition(e) {
    if (!state.isEditMode || !state.activeNode || tick) return;
    
    tick = true;
    requestAnimationFrame(() => {
        const rect = document.getElementById('map-container').getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        
        state.activeNode.style.left = `${x.toFixed(2)}%`;
        state.activeNode.style.top = `${y.toFixed(2)}%`;
        renderAllArrows();
        tick = false;
    });
}

// Event Listeners
window.addEventListener('keydown', e => {
    if (e.key.toLowerCase() === 'e') {
        state.isEditMode = !state.isEditMode;
        document.body.classList.toggle('edit-mode-active', state.isEditMode);
    }
});

document.addEventListener('mousedown', e => {
    state.activeNode = state.isEditMode ? e.target.closest('.map-node') : null;
});

document.addEventListener('mousemove', updateNodesPosition);
document.addEventListener('mouseup', () => {
    if (state.activeNode) {
        console.log(`Node ${state.activeNode.dataset.id}:`, {
            top: state.activeNode.style.top,
            left: state.activeNode.style.left
        });
        state.activeNode = null;
    }
});

init();
    </script>
</body>
</html>
