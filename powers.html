<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Mục Kỹ Năng - PoC Guide</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'lor-gold': '#c89b3c' }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #04060b; color: #f8fafc; font-family: 'Open Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        
        .bg-fixed-section {
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            background-image: linear-gradient(to bottom, #04060b 0%, rgba(4, 6, 11, 0.7) 50%, #04060b 100%), 
                              url('https://images.contentstack.io/v3/assets/blt0eb2a29869260172/LoR_WorldMap_Background.jpg');
        }

        /* --- CSS MỚI CHO GIAO DIỆN ICON --- */
        .power-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .power-item:hover {
            transform: translateY(-5px);
        }

        /* Container chứa ảnh, xử lý bo góc và viền độ hiếm */
        .power-icon-container {
            position: relative;
            width: 100px; /* Kích thước icon giống trong ảnh mẫu */
            height: 100px;
            margin-bottom: 1rem;
            border-radius: 16px; /* Bo góc nhẹ cho ảnh */
            overflow: hidden; /* Để ảnh không tràn khỏi viền bo */
            border: 2px solid rgba(255,255,255,0.1); /* Viền mặc định */
            transition: all 0.3s ease;
            background: #0a1223; /* Nền tối cho icon */
        }

        .power-item:hover .power-icon-container {
            box-shadow: 0 0 20px rgba(200, 155, 60, 0.3);
        }

        /* Màu viền độ hiếm phát sáng (Glow) quanh ảnh */
        .border-Legendary .power-icon-container { border-color: #fde047; box-shadow: 0 0 15px rgba(253, 224, 71, 0.2); }
        .border-Epic .power-icon-container { border-color: #a855f7; box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }
        .border-Rare .power-icon-container { border-color: #06b6d4; box-shadow: 0 0 15px rgba(6, 182, 212, 0.2); }
        .border-Common .power-icon-container { border-color: #94a3b8; box-shadow: 0 0 10px rgba(148, 163, 184, 0.1); }
        /* Màu viền phát sáng cho độ hiếm Special */
/* Viền và hiệu ứng phát sáng màu đỏ cho Special */
.border-Special .power-icon-container { 
    border-color: #ef4444; /* đỏ red-500 */
    box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); 
}

/* Màu chữ độ hiếm Special (đỏ sáng hơn để dễ đọc) */
.text-Special { color: #f87171; } /* đỏ nhạt red-400 */
        /* Typography cho tên và mô tả */
        .power-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2px;
            color: white;
        }

        .power-rarity-text {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        .power-description {
            font-size: 12px;
            color: #94a3b8; /* slate-400 */
            line-height: 1.6;
            max-width: 250px; /* Giới hạn độ rộng mô tả để dễ đọc */
        }

        /* Màu chữ độ hiếm */
        .text-Legendary { color: #fde047; }
        .text-Epic { color: #c084fc; } /* purple-400 */
        .text-Rare { color: #22d3ee; } /* cyan-400 */
        .text-Common { color: #94a3b8; } /* slate-400 */

        /* -------------------------------------- */

        .filter-btn.active {
            background-color: #c89b3c !important;
            color: black !important;
            border-color: #c89b3c !important;
        }

        /* Pagination */
        .page-btn { transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .page-btn:hover:not(:disabled) { border-color: #c89b3c; color: #c89b3c; }
        .page-btn.active { background: #c89b3c; color: black; border-color: #c89b3c; }
    </style>
</head>
<body>

    <script src="components.js"></script>

    <div class="bg-fixed-section min-h-screen pt-32 pb-24">
        <div class="max-w-[1400px] mx-auto px-6">
            
            <div class="flex flex-col lg:flex-row justify-between items-end mb-16 gap-8">
                <div class="max-w-2xl">
                    <h1 class="text-4xl md:text-5xl font-bold uppercase mb-4 tracking-tight">Hệ Thống <span class="text-lor-gold">Kỹ Năng</span></h1>
                    <p class="text-slate-400 text-base border-l-2 border-lor-gold/50 pl-4 py-1 italic">
                        Cơ sở dữ liệu toàn diện về các chỉ số, hiệu ứng và cấp bậc của hệ thống Powers.
                    </p>
                </div>
                
                <div class="flex flex-wrap items-center gap-4 w-full lg:w-auto">
                    <div class="relative flex-grow sm:flex-grow-0">
                        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                        <input type="text" id="searchInput" placeholder="Tìm kỹ năng..." 
                               class="bg-white/5 border border-white/10 rounded-xl pl-12 pr-5 py-3 text-base focus:border-lor-gold outline-none w-full sm:w-64 transition-all text-white">
                    </div>

                    <div class="flex bg-white/5 p-1 rounded-xl border border-white/10 text-[10px] font-bold uppercase tracking-widest">
                        <button onclick="setFilter('all', this)" class="filter-btn active px-4 py-2 rounded-lg transition-all">Tất cả</button>
                        <button onclick="setFilter('Special', this)" class="filter-btn px-4 py-2 rounded-lg text-red-500">Đặc biệt</button>
                        <button onclick="setFilter('Legendary', this)" class="filter-btn px-4 py-2 rounded-lg text-yellow-400">H.Thoại</button>
                        <button onclick="setFilter('Epic', this)" class="filter-btn px-4 py-2 rounded-lg text-purple-400">Sử Thi</button>
                        <button onclick="setFilter('Rare', this)" class="filter-btn px-4 py-2 rounded-lg text-cyan-400">Hiếm</button>
                    </div>
                </div>
            </div>

            <div id="power-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-x-10 gap-y-16 mb-16 px-4"></div>

            <div id="pagination" class="flex justify-center items-center gap-2"></div>
        </div>
    </div>

    <script>
        let allPowers = [];
        let filteredPowers = [];
        let dictionary = { vocabTerms: [], keywords: [] };
        let currentRarity = 'all';
        
        // Phân trang - Tăng số lượng item mỗi trang vì giao diện icon nhỏ hơn
        let currentPage = 1;
        const itemsPerPage = 20; 

        async function init() {
            try {
                const [powersRes, dictRes] = await Promise.all([
                    fetch('powers.json'),
                    fetch('dictionary.json')
                ]);
                allPowers = await powersRes.json();
                dictionary = await dictRes.json();
                updateFiltered();
            } catch (e) {
                document.getElementById('power-grid').innerHTML = '<p class="col-span-full text-center py-20 text-red-400 italic">Lỗi: Không tìm thấy file dữ liệu!</p>';
            }
        }

        // Giữ nguyên hàm cleanText của bạn
        function cleanText(text) {
            if (!text) return "";
            return text
                .replace(/<style=[^>]*>(.*?)<\/style>/g, '$1')
                .replace(/<link=[^>]*>(.*?)<\/link>/g, '$1')
                .replace(/<sprite[^>]*>/g, '')
                .replace(/<br>/g, ' ') // Chuyển br thành khoảng trắng cho giao diện gọn
                .trim();
        }

        function updateFiltered() {
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            filteredPowers = allPowers.filter(item => {
                const matchesRarity = currentRarity === 'all' || item.rarityRef === currentRarity;
                const matchesSearch = item.name.toLowerCase().includes(searchVal);
                return matchesRarity && matchesSearch;
            });
            currentPage = 1;
            render();
        }

        function render() {
            const grid = document.getElementById('power-grid');
            const paginationEl = document.getElementById('pagination');
            
            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedItems = filteredPowers.slice(startIndex, startIndex + itemsPerPage);

            if (paginatedItems.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center py-20 text-slate-500 text-xl">Không tìm thấy kỹ năng nào.</p>';
                paginationEl.innerHTML = '';
                return;
            }

            // --- CẤU TRÚC HTML MỚI TRONG MAP ---
            grid.innerHTML = paginatedItems.map(item => `
                <div class="power-item border-${item.rarityRef}">
                    <div class="power-icon-container shadow-xl">
                        <img src="${item.assetAbsolutePath}" class="w-full h-full object-cover" loading="lazy">
                        <div class="absolute inset-x-0 bottom-0 h-1/2 bg-gradient-to-t from-black/50 to-transparent"></div>
                    </div>

                    <h3 class="power-name group-hover:text-lor-gold transition-colors">
                        ${item.name}
                    </h3>
                    
                    <div class="power-rarity-text text-${item.rarityRef}">
                        ${item.rarity}
                    </div>

                    <p class="power-description">
                        ${cleanText(item.description)}
                    </p>
                </div>
            `).join('');

            renderPagination(paginationEl);
            if(window.lucide) lucide.createIcons();
        }

        function renderPagination(container) {
            const totalPages = Math.ceil(filteredPowers.length / itemsPerPage);
            if (totalPages <= 1) { container.innerHTML = ''; return; }

            let btns = [];
            btns.push(`<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} class="page-btn px-4 py-2 rounded-lg bg-white/5 disabled:opacity-20"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>`);

            // Logic phân trang đơn giản
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    btns.push(`<button onclick="changePage(${i})" class="page-btn w-10 h-10 rounded-lg font-bold ${i === currentPage ? 'active' : 'bg-white/5'}">${i}</button>`);
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    btns.push(`<span class="text-slate-600 px-2">...</span>`);
                }
            }

            btns.push(`<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} class="page-btn px-4 py-2 rounded-lg bg-white/5 disabled:opacity-20"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>`);
            container.innerHTML = btns.join('');
        }

        function changePage(page) {
            currentPage = page;
            render();
            window.scrollTo({ top: 200, behavior: 'smooth' });
        }

        function setFilter(rarity, btn) {
            currentRarity = rarity;
            document.querySelectorAll('.filter-btn').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
            updateFiltered();
        }

        document.getElementById('searchInput').addEventListener('input', updateFiltered);
        init();
    </script>
</body>
</html>
