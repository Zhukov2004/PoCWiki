<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Mục Kỹ Năng - PoC Guide</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'lor-gold': '#c89b3c' }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #04060b; color: #f8fafc; font-family: 'Open Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        
        .bg-fixed-section {
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            background-image: linear-gradient(to bottom, #04060b 0%, rgba(4, 6, 11, 0.9) 50%, #04060b 100%), 
                              url('https://images.contentstack.io/v3/assets/blt0eb2a29869260172/LoR_WorldMap_Background.jpg');
        }

        .power-card {
            background: rgba(10, 18, 35, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .power-card:hover { 
            transform: translateY(-6px); 
            background: rgba(16, 28, 55, 0.95);
            border-color: rgba(200, 155, 60, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        /* Viền độ hiếm đặc thù cho Power */
        .border-Legendary { border-top: 5px solid #fde047; }
        .border-Epic { border-top: 5px solid #a855f7; }
        .border-Rare { border-top: 5px solid #06b6d4; }
        .border-Common { border-top: 5px solid #94a3b8; }

        .filter-btn.active {
            background-color: #c89b3c !important;
            color: black !important;
            border-color: #c89b3c !important;
        }

        /* Tooltip System */
        .tooltip-container { position: relative; display: inline; cursor: help; border-bottom: 1px dashed rgba(255,255,255,0.3); }
        .tooltip-text {
            visibility: hidden; width: 220px; background: #1a2235; color: #f8fafc;
            border: 1px solid #c89b3c; border-radius: 8px; padding: 12px;
            position: absolute; z-index: 100; bottom: 130%; left: 50%;
            transform: translateX(-50%); opacity: 0; transition: 0.3s;
            font-size: 12px; line-height: 1.5; pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); font-style: normal;
        }
        .tooltip-container:hover .tooltip-text { visibility: visible; opacity: 1; bottom: 120%; }

        /* Pagination */
        .page-btn { transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .page-btn:hover:not(:disabled) { border-color: #c89b3c; color: #c89b3c; }
        .page-btn.active { background: #c89b3c; color: black; border-color: #c89b3c; }
    </style>
</head>
<body>

    <script src="components.js"></script>

    <div class="bg-fixed-section min-h-screen pt-32 pb-24">
        <div class="max-w-[1400px] mx-auto px-6">
            
            <div class="flex flex-col lg:flex-row justify-between items-end mb-12 gap-8">
                <div class="max-w-2xl">
                    <h1 class="text-4xl md:text-5xl font-bold uppercase mb-4 tracking-tight">Hệ Thống <span class="text-lor-gold">Kỹ Năng</span></h1>
                    <p class="text-slate-400 text-base border-l-2 border-lor-gold/50 pl-4 py-1 italic">
                        Cơ sở dữ liệu toàn diện về các chỉ số, hiệu ứng và cấp bậc của hệ thống Powers.
                    </p>
                </div>
                
                <div class="flex flex-wrap items-center gap-4 w-full lg:w-auto">
                    <div class="relative flex-grow sm:flex-grow-0">
                        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                        <input type="text" id="searchInput" placeholder="Tìm kỹ năng..." 
                               class="bg-white/5 border border-white/10 rounded-xl pl-12 pr-5 py-3 text-base focus:border-lor-gold outline-none w-full sm:w-64 transition-all text-white">
                    </div>

                    <div class="flex bg-white/5 p-1 rounded-xl border border-white/10 text-[10px] font-bold uppercase tracking-widest">
                        <button onclick="setFilter('all', this)" class="filter-btn active px-4 py-2 rounded-lg transition-all">Tất cả</button>
                        <button onclick="setFilter('Legendary', this)" class="filter-btn px-4 py-2 rounded-lg text-yellow-400">H.Thoại</button>
                        <button onclick="setFilter('Epic', this)" class="filter-btn px-4 py-2 rounded-lg text-purple-400">Sử Thi</button>
                        <button onclick="setFilter('Rare', this)" class="filter-btn px-4 py-2 rounded-lg text-cyan-400">Hiếm</button>
                    </div>
                </div>
            </div>

            <div id="power-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 mb-12"></div>

            <div id="pagination" class="flex justify-center items-center gap-2"></div>
        </div>
    </div>

    <script>
        let allPowers = [];
        let filteredPowers = [];
        let dictionary = { vocabTerms: [], keywords: [] };
        let currentRarity = 'all';
        
        // Phân trang
        let currentPage = 1;
        const itemsPerPage = 12;

        async function init() {
            try {
                const [powersRes, dictRes] = await Promise.all([
                    fetch('powers.json'),
                    fetch('dictionary.json')
                ]);
                allPowers = await powersRes.json();
                dictionary = await dictRes.json();
                updateFiltered();
            } catch (e) {
                document.getElementById('power-grid').innerHTML = '<p class="col-span-full text-center py-20 text-red-400 italic">Lỗi: Không tìm thấy file dữ liệu!</p>';
            }
        }

        function getDefinition(term) {
            const lowerTerm = term.toLowerCase().trim();
            const findIn = (list) => list.find(i => i.name.toLowerCase() === lowerTerm);
            const result = findIn(dictionary.vocabTerms) || findIn(dictionary.keywords);
            return result ? result.description : "Thông tin đang được cập nhật...";
        }

        function cleanText(text) {
            if (!text) return "";
            return text
                .replace(/<(style=Keyword|style=Vocab)>(.*?)<\/style>/g, (match, type, content) => {
                    const desc = getDefinition(content);
                    const colorClass = type.includes('Vocab') ? 'text-lor-gold italic' : 'text-cyan-400';
                    return `
                        <span class="tooltip-container ${colorClass} font-bold">
                            ${content}
                            <span class="tooltip-text font-normal text-slate-300">
                                <b class="text-lor-gold block mb-1 border-b border-lor-gold/20 pb-1 font-bold">${content}</b>
                                ${desc}
                            </span>
                        </span>`;
                })
                .replace(/<link=.*?>(.*?)<\/link>/g, '<span class="text-white font-semibold">$1</span>')
                .replace(/<sprite.*?>/g, '')
                .replace(/<br>/g, '<br class="mb-2 block">');
        }

        function updateFiltered() {
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            filteredPowers = allPowers.filter(item => {
                const matchesRarity = currentRarity === 'all' || item.rarityRef === currentRarity;
                const matchesSearch = item.name.toLowerCase().includes(searchVal);
                return matchesRarity && matchesSearch;
            });
            currentPage = 1;
            render();
        }

        function render() {
            const grid = document.getElementById('power-grid');
            const paginationEl = document.getElementById('pagination');
            
            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedItems = filteredPowers.slice(startIndex, startIndex + itemsPerPage);

            if (paginatedItems.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center py-20 text-slate-500 text-xl">Không tìm thấy kỹ năng nào.</p>';
                paginationEl.innerHTML = '';
                return;
            }

            grid.innerHTML = paginatedItems.map(item => `
                <div class="power-card group p-7 pb-10 border-${item.rarityRef} flex flex-col h-full shadow-2xl">
                    <div class="relative w-full aspect-square mb-6 bg-gradient-to-b from-white/5 to-transparent rounded-full flex items-center justify-center overflow-hidden border border-white/5 shadow-inner">
                        <img src="${item.assetAbsolutePath}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" loading="lazy">
                        <div class="absolute inset-0 bg-gradient-to-t from-[#04060b]/80 via-transparent to-transparent"></div>
                        <span class="absolute bottom-4 px-3 py-1 bg-black/60 rounded-full text-[8px] font-black tracking-[0.2em] border border-white/10 uppercase text-white">
                            ${item.rarity}
                        </span>
                    </div>

                    <h3 class="text-xl font-bold text-white mb-4 group-hover:text-lor-gold transition-colors leading-tight min-h-[56px] flex items-center">
                        ${item.name}
                    </h3>

                    <div class="text-[14px] text-slate-300 leading-relaxed italic flex-grow">
                        ${cleanText(item.description)}
                    </div>
                </div>
            `).join('');

            renderPagination(paginationEl);
            if(window.lucide) lucide.createIcons();
        }

        function renderPagination(container) {
            const totalPages = Math.ceil(filteredPowers.length / itemsPerPage);
            if (totalPages <= 1) { container.innerHTML = ''; return; }

            let btns = [];
            btns.push(`<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} class="page-btn px-4 py-2 rounded-lg bg-white/5 disabled:opacity-20"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>`);

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    btns.push(`<button onclick="changePage(${i})" class="page-btn w-10 h-10 rounded-lg font-bold ${i === currentPage ? 'active' : 'bg-white/5'}">${i}</button>`);
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    btns.push(`<span class="text-slate-600 px-2">...</span>`);
                }
            }

            btns.push(`<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} class="page-btn px-4 py-2 rounded-lg bg-white/5 disabled:opacity-20"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>`);
            container.innerHTML = btns.join('');
        }

        function changePage(page) {
            currentPage = page;
            render();
            window.scrollTo({ top: 200, behavior: 'smooth' });
        }

        function setFilter(rarity, btn) {
            currentRarity = rarity;
            document.querySelectorAll('.filter-btn').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
            updateFiltered();
        }

        document.getElementById('searchInput').addEventListener('input', updateFiltered);
        init();
    </script>
</body>
</html>
